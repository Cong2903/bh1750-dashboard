<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.dashboard{
    text-align:center;
    background: rgba(255,255,255,0.05);
    padding: 30px 20px;
    border-radius: 30px;
    border: 3px solid lime;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    width: 320px;
}

#loadingText{
    font-size:24px;
    margin:60px 0;
}

#status{
    margin-top:10px;
    font-size:18px;
}

button{
    margin:10px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

/* màu */
.on{background:lime;}
.off{background:red;color:white;}
.red{background:red;}
.green{background:green;}
.blue{background:blue;color:white;}
</style>
</head>

<body>

<div class="dashboard">

<div id="loadingText">Loading.</div>

<div id="mainContent" style="display:none;">

<h2>🎨 RGB Control</h2>

<div id="status">Disconnected</div>

<button class="on" onclick="sendCmd('ON')">ON</button>
<button class="off" onclick="sendCmd('OFF')">OFF</button>

<br>

<button class="red" onclick="sendCmd('RED')">RED</button>
<button class="green" onclick="sendCmd('GREEN')">GREEN</button>
<button class="blue" onclick="sendCmd('BLUE')">BLUE</button>

</div>

</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>

// ===== LOADING =====
let dots = 1;
setInterval(()=>{
    document.getElementById("loadingText").innerText =
    "Loading"+".".repeat(dots);
    dots = dots>=3?1:dots+1;
},500);

// ===== SOUND =====
function playClick(){
    const s = document.getElementById("clickSound");
    s.currentTime = 0;
    s.play().catch(()=>{});
}

// ===== MQTT =====
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt", {
    reconnectPeriod: 1000
});

let lastDataTime = 0;
const TIMEOUT = 5000;

// ===== CONNECT =====
client.on("connect",()=>{
    console.log("MQTT connected");

    lastDataTime = Date.now();

    document.getElementById("status").innerText = "🟢 Connected";

    client.subscribe("bh1750/led");
});

// ===== RECEIVE =====
client.on("message",(topic,message)=>{

    lastDataTime = Date.now();

    document.getElementById("loadingText").style.display="none";
    document.getElementById("mainContent").style.display="block";

    if(topic==="bh1750/led"){
        let state = message.toString();

        document.getElementById("status").innerText =
        state==="ON"?"💡 RGB ON":"🌙 RGB OFF";
    }
});

// ===== DISCONNECT CHECK =====
setInterval(()=>{
    if(Date.now() - lastDataTime > TIMEOUT){
        document.getElementById("loadingText").style.display="block";
        document.getElementById("mainContent").style.display="none";
    }
},1000);

// ===== BUTTON =====
function sendCmd(cmd){
    playClick();
    client.publish("bh1750/control", cmd);
}

// ===== DEBUG =====
client.on("offline", ()=>{
    console.log("MQTT offline");
    document.getElementById("status").innerText = "🔴 Offline";
});

client.on("reconnect", ()=>{
    console.log("Reconnecting...");
});

client.on("error", err=>{
    console.log("Error",err);
});

</script>

</body>
</html>
