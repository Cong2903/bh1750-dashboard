<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:#1e3c72;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.dashboard{
    text-align:center;
    padding:20px;
    border-radius:20px;
    border:3px solid lime;
}
#lux{font-size:50px;}
button{padding:10px;margin:5px;}
</style>
</head>

<body>

<div class="dashboard">

<div id="loading">Loading...</div>

<div id="main" style="display:none;">
<h2>BH1750</h2>

<canvas id="chart" width="300" height="300"></canvas>

<div id="lux">--</div>
<div id="status"></div>

<button onclick="send('ON')">ON</button>
<button onclick="send('OFF')">OFF</button>
</div>

</div>

<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>

// unlock audio
document.body.addEventListener("click", ()=>{
 let s=document.getElementById("sound");
 s.play().then(()=>{s.pause();s.currentTime=0;});
},{once:true});

// sound
function clickSound(){
 let s=document.getElementById("sound");
 s.currentTime=0;
 s.play().catch(()=>{});
}

// chart
function draw(lux){
 let ctx=document.getElementById("chart").getContext("2d");
 ctx.clearRect(0,0,300,300);

 let p=Math.min(lux/1500,1);
 let a=p*Math.PI*2;

 ctx.beginPath();
 ctx.arc(150,150,100,0,Math.PI*2);
 ctx.strokeStyle='gray';
 ctx.lineWidth=20;
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(150,150,100,-Math.PI/2,-Math.PI/2+a);
 ctx.strokeStyle='lime';
 ctx.lineWidth=20;
 ctx.stroke();
}

// MQTT
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

let last=0;

client.on("connect",()=>{
 client.subscribe("bh1750/lux");
 client.subscribe("bh1750/led");
});

client.on("message",(t,m)=>{

 last=Date.now();

 document.getElementById("loading").style.display="none";
 document.getElementById("main").style.display="block";

 if(t==="bh1750/lux"){
  let data=JSON.parse(m.toString());

  if(data.status==="ERROR"){
    document.getElementById("lux").innerText="ERROR";
    document.getElementById("status").innerText="Sensor lỗi";
    return;
  }

  document.getElementById("lux").innerText=data.lux+" lux";
  draw(data.lux);
 }

 if(t==="bh1750/led"){
  document.getElementById("status").innerText=m.toString();
 }
});

// mất kết nối
setInterval(()=>{
 if(Date.now()-last>5000){
  document.getElementById("loading").style.display="block";
  document.getElementById("main").style.display="none";
 }
},1000);

// send
function send(cmd){
 clickSound();
 client.publish("bh1750/control",cmd);
}

</script>

</body>
</html>
