<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#eef2f7;
    padding:20px;
}

.header{
    background:linear-gradient(135deg,#3a6ff7,#5b3df5);
    color:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.container{
    margin-top:20px;
    display:flex;
    gap:20px;
    justify-content:center;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    width:250px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.value{
    font-size:40px;
    font-weight:bold;
}

.lux{border-bottom:5px solid #f5c542;}
.temp{border-bottom:5px solid #ff6b6b;}
.hum{border-bottom:5px solid #4dabf7;}

#loading{
    text-align:center;
    margin-top:40px;
}

.control{
    text-align:center;
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#3a6ff7;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <h1>HỆ THỐNG GIÁM SÁT MÔI TRƯỜNG</h1>
    <div>Nguyễn Văn A - 2026xxxx</div>
</div>

<div id="loading">Đang tải dữ liệu...</div>

<div id="main" style="display:none;">

<div class="container">

<div class="card lux">
<h3>Cường Độ Ánh Sáng</h3>
<div id="lux" class="value">--</div>
</div>

<div class="card temp">
<h3>Nhiệt Độ</h3>
<div id="temp" class="value">--</div>
</div>

<div class="card hum">
<h3>Độ Ẩm</h3>
<div id="hum" class="value">--</div>
</div>

</div>

<div class="control">
<button onclick="send('ON')">BẬT</button>
<button onclick="send('OFF')">TẮT</button>
<div id="status"></div>
</div>

</div>

<script>

// MQTT
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

let last = 0;

// DOM
let luxEl = document.getElementById("lux");
let tempEl = document.getElementById("temp");
let humEl = document.getElementById("hum");
let loadingEl = document.getElementById("loading");
let mainEl = document.getElementById("main");
let statusEl = document.getElementById("status");

// CONNECT
client.on("connect",()=>{
    console.log("MQTT OK");
    client.subscribe("bh1750/lux");
    client.subscribe("bh1750/led");
});

// RECEIVE
client.on("message",(t,m)=>{

    last = Date.now();

    loadingEl.style.display="none";
    mainEl.style.display="block";

    if(t==="bh1750/lux"){

        let data = JSON.parse(m.toString());

        // ===== LUX =====
        if(data.lux === null || data.lux_status === "ERROR"){
            luxEl.innerText = "ERROR";
            luxEl.style.color = "red";
        }else{
            luxEl.innerText = data.lux + " lux";
            luxEl.style.color = "black";
        }

        // ===== TEMP =====
        if(data.temp_status === "ERROR"){
            tempEl.innerText = "ERROR";
            tempEl.style.color = "red";
        }else{
            tempEl.innerText = data.temp + " °C";
            tempEl.style.color = "black";
        }

        // ===== HUM =====
        if(data.hum_status === "ERROR"){
            humEl.innerText = "ERROR";
            humEl.style.color = "red";
        }else{
            humEl.innerText = data.hum + " %";
            humEl.style.color = "black";
        }
    }

    if(t==="bh1750/led"){
        statusEl.innerText = "LED: " + m.toString();
    }
});

// mất dữ liệu
setInterval(()=>{
    if(Date.now() - last > 5000){
        loadingEl.style.display="block";
        mainEl.style.display="none";
    }
},1000);

// SEND
function send(cmd){
    client.publish("bh1750/control",cmd);
}

</script>

</body>
</html>
