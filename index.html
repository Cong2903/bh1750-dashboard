<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BH1750 Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

/* ===== CARD ===== */
.dashboard{
    text-align:center;
    background: rgba(255,255,255,0.05);
    padding: 30px 20px;

    border-radius: 30px;
    border: 3px solid lime;

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);

    backdrop-filter: blur(10px);

    width: 320px;
}

/* ===== TEXT ===== */
#luxValue{
    font-size:60px;
    font-weight:bold;
    margin-top:20px;
}

#statusText{
    font-size:20px;
    margin-top:10px;
}

canvas{
    display:block;
    margin:auto;
}

/* ===== BUTTON ===== */
.button-group{
    margin-top:20px;
}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.95);
}

.btn-on{
    background:lime;
}

.btn-off{
    background:red;
    color:white;
}
</style>
</head>

<body>

<div class="dashboard">
    <h2 id="sensorName">🌞 Loading...</h2>

    <canvas id="chart" width="300" height="300"></canvas>

    <div id="luxValue">-- lux</div>

    <div id="statusText">...</div>

    <div class="button-group">
        <button class="btn-on" onclick="turnOn()">ON</button>
        <button class="btn-off" onclick="turnOff()">OFF</button>
    </div>
</div>

<script>

// ===== DRAW CHART =====
function drawPie(lux, status){
    const ctx = document.getElementById("chart").getContext("2d");
    ctx.clearRect(0,0,300,300);

    const cx=150,cy=150,r=100;
    const percent=Math.min(lux/1500,1);
    const angle=percent*Math.PI*2;

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=20;
    ctx.stroke();

    let color = (status === "OK") ? "lime" : "red";

    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+angle);
    ctx.strokeStyle=color;
    ctx.lineWidth=20;
    ctx.lineCap='round';
    ctx.stroke();

    ctx.fillStyle='white';
    ctx.font='bold 24px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(Math.round(lux)+' lux',cx,cy);
}

// ===== MQTT CONNECT =====
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
    reconnectPeriod: 1000
});

// ===== CONNECT =====
client.on("connect", () => {
    console.log("MQTT connected");
    client.subscribe("bh1750/lux");
});

// ===== RECEIVE DATA =====
client.on("message", (topic, message) => {

    try {
        const data = JSON.parse(message.toString());

        document.getElementById("sensorName").innerText = "🌞 " + data.name;

        document.getElementById("luxValue").innerText = Math.round(data.lux) + " lux";

        if (data.status === "OK") {
            document.getElementById("statusText").innerText = "✔ OK";
            document.getElementById("statusText").style.color = "lightgreen";
            document.querySelector(".dashboard").style.borderColor = "lime";
        } else {
            document.getElementById("statusText").innerText = "❌ ERROR";
            document.getElementById("statusText").style.color = "red";
            document.querySelector(".dashboard").style.borderColor = "red";
        }

        drawPie(data.lux, data.status);

    } catch (e) {
        console.log("JSON error");
    }
});

// ===== BUTTON CONTROL =====
function turnOn(){
    client.publish("bh1750/control", "ON");
    console.log("Send ON");
}

function turnOff(){
    client.publish("bh1750/control", "OFF");
    console.log("Send OFF");
}

// ===== ERROR =====
client.on("error", (err) => {
    console.log("MQTT error:", err);
});

</script>

</body>
</html>
