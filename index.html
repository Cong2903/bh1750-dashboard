<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.dashboard{
    text-align:center;
    background: rgba(255,255,255,0.05);
    padding: 30px 20px;
    border-radius: 30px;
    border: 3px solid lime;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    width: 320px;
}

#loadingText{
    font-size:24px;
    margin:60px 0;
}

#luxValue{
    font-size:60px;
    font-weight:bold;
}

#statusText{
    font-size:20px;
    margin-top:10px;
}

#ledState{
    margin-top:10px;
}

canvas{
    display:block;
    margin:auto;
}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.btn-on{ background:lime; }
.btn-off{ background:red; color:white; }
</style>
</head>

<body>

<div class="dashboard">

<div id="loadingText">Loading.</div>

<div id="mainContent" style="display:none;">

<h2 id="sensorName">🌞</h2>

<canvas id="chart" width="300" height="300"></canvas>

<div id="luxValue">-- lux</div>
<div id="statusText">...</div>
<div id="ledState">💡 LED OFF</div>

<button class="btn-on" onclick="turnOn()">ON</button>
<button class="btn-off" onclick="turnOff()">OFF</button>

</div>

</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>

// ===== LOADING ANIMATION =====
let dots = 1;
setInterval(()=>{
    document.getElementById("loadingText").innerText =
    "Loading"+".".repeat(dots);
    dots = dots>=3?1:dots+1;
},500);

// ===== SOUND =====
function playClick(){
    const s=document.getElementById("clickSound");
    s.currentTime=0;
    s.play().catch(()=>console.log("🔇 blocked"));
}

// ===== DRAW CHART =====
function drawPie(lux,status){
    const ctx=document.getElementById("chart").getContext("2d");
    ctx.clearRect(0,0,300,300);

    let percent=Math.min(lux/1500,1);
    let angle=percent*Math.PI*2;

    ctx.beginPath();
    ctx.arc(150,150,100,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=20;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(150,150,100,-Math.PI/2,-Math.PI/2+angle);
    ctx.strokeStyle=(status==="OK")?"lime":"red";
    ctx.lineWidth=20;
    ctx.lineCap='round';
    ctx.stroke();

    ctx.fillStyle='white';
    ctx.font='bold 24px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(Math.round(lux)+' lux',150,150);
}

// ===== MQTT =====
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

// ===== CONNECTION TRACK =====
let lastDataTime = 0;
const TIMEOUT = 3000;

// ===== CONNECT =====
client.on("connect",()=>{
    console.log("MQTT connected");

    lastDataTime = Date.now(); // FIX

    client.subscribe("bh1750/lux");
    client.subscribe("bh1750/led");
});

// ===== RECEIVE =====
client.on("message",(topic,message)=>{

    lastDataTime = Date.now();

    document.getElementById("loadingText").style.display="none";
    document.getElementById("mainContent").style.display="block";

    // ===== LED =====
    if(topic==="bh1750/led"){
        const state = message.toString();

        document.getElementById("ledState").innerText =
        state==="ON"?"💡 LED ON":"🌙 LED OFF";

        return;
    }

    // ===== SENSOR =====
    let data;
    try{
        data = JSON.parse(message.toString());
    }catch(e){
        console.log("JSON lỗi");
        return;
    }

    const lux = data.lux || 0;

    document.getElementById("sensorName").innerText="🌞 "+(data.name||"Sensor");
    document.getElementById("luxValue").innerText=Math.round(lux)+" lux";

    if(data.status==="OK"){
        document.getElementById("statusText").innerText="✔ OK";
        document.querySelector(".dashboard").style.borderColor="lime";
    }else{
        document.getElementById("statusText").innerText="❌ ERROR";
        document.querySelector(".dashboard").style.borderColor="red";
    }

    drawPie(lux,data.status);
});

// ===== CHECK DISCONNECT =====
setInterval(()=>{
    if(Date.now() - lastDataTime > TIMEOUT){
        document.getElementById("loadingText").style.display="block";
        document.getElementById("mainContent").style.display="none";
    }
},1000);

// ===== BUTTON =====
function turnOn(){
    playClick();
    client.publish("bh1750/control","ON");
}

function turnOff(){
    playClick();
    client.publish("bh1750/control","OFF");
}

// ===== DEBUG =====
client.on("offline", ()=>console.log("MQTT offline"));
client.on("reconnect", ()=>console.log("MQTT reconnecting..."));
client.on("error", (err)=>console.log("MQTT error",err));

</script>

</body>
</html>
