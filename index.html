<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Smart IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.dashboard{
    text-align:center;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 30px;
    border: 3px solid lime;
    width: 320px;
}

#value{
    font-size:50px;
    margin:15px;
}

canvas{
    display:block;
    margin:auto;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="dashboard">

<div id="loading">Loading...</div>

<div id="main" style="display:none;">

<h2 id="sensorName">---</h2>

<canvas id="chart" width="300" height="300"></canvas>

<div id="value">--</div>
<div id="status"></div>

<button onclick="send('ON')">ON</button>
<button onclick="send('OFF')">OFF</button>

</div>

</div>

<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>

// ===== AUDIO FIX =====
document.body.addEventListener("click", ()=>{
 let s=document.getElementById("sound");
 s.play().then(()=>{s.pause();s.currentTime=0;});
},{once:true});

function clickSound(){
 let s=document.getElementById("sound");
 s.currentTime=0;
 s.play().catch(()=>{});
}

// ===== CHART =====
function draw(value){
 let ctx=document.getElementById("chart").getContext("2d");
 ctx.clearRect(0,0,300,300);

 let p=Math.min(value/1500,1);
 let a=p*Math.PI*2;

 ctx.beginPath();
 ctx.arc(150,150,100,0,Math.PI*2);
 ctx.strokeStyle='rgba(255,255,255,0.1)';
 ctx.lineWidth=20;
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(150,150,100,-Math.PI/2,-Math.PI/2+a);
 ctx.strokeStyle='lime';
 ctx.lineWidth=20;
 ctx.lineCap='round';
 ctx.stroke();
}

// ===== MQTT =====
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt", {
 reconnectPeriod: 1000
});

let lastDataTime = 0;
const TIMEOUT = 5000; // tăng lên cho ổn định

// ===== CONNECT =====
client.on("connect",()=>{
 console.log("MQTT connected");

 client.subscribe("sensor/data");
 client.subscribe("bh1750/led");
});

// ===== RECEIVE =====
client.on("message",(topic,message)=>{

 console.log("DATA:", message.toString());

 lastDataTime = Date.now();

 document.getElementById("loading").style.display="none";
 document.getElementById("main").style.display="block";

 // ===== SENSOR =====
 if(topic==="sensor/data"){

  let data;

  try{
    data = JSON.parse(message.toString());
  }catch(e){
    console.log("JSON lỗi");
    return;
  }

  document.getElementById("sensorName").innerText = "🌐 " + data.name;

  if(data.status==="ERROR"){
    document.getElementById("value").innerText = "ERROR";
    document.getElementById("status").innerText = "❌ Sensor lỗi";

    // clear chart
    let ctx=document.getElementById("chart").getContext("2d");
    ctx.clearRect(0,0,300,300);

    return;
  }

  // HIỂN THỊ 1 SỐ THẬP PHÂN
  let value = Number(data.value).toFixed(1);

  document.getElementById("value").innerText =
    value + " " + data.unit;

  draw(parseFloat(value));
 }

 // ===== LED =====
 if(topic==="bh1750/led"){
  document.getElementById("status").innerText =
    message.toString()==="ON" ? "💡 LED ON" : "🌙 LED OFF";
 }
});

// ===== AUTO LOADING =====
setInterval(()=>{

 if(Date.now() - lastDataTime > TIMEOUT){

  document.getElementById("loading").style.display="block";
  document.getElementById("main").style.display="none";

 }

},1000);

// ===== SEND =====
function send(cmd){
 clickSound();
 client.publish("bh1750/control",cmd);
}

// ===== DEBUG =====
client.on("error",(err)=>{
 console.log("MQTT ERROR", err);
});

client.on("offline",()=>{
 console.log("MQTT OFFLINE");
});

</script>

</body>
</html>
