<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:#1e3c72;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.dashboard{text-align:center;}

.card{
    background:white;
    color:black;
    padding:20px;
    margin:10px;
    border-radius:15px;
    width:200px;
    display:inline-block;
}

.loader{
    border:4px solid #f3f3f3;
    border-top:4px solid #3498db;
    border-radius:50%;
    width:25px;
    height:25px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.value{
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="dashboard">
    <h1>HỆ THỐNG GIÁM SÁT</h1>

    <div class="card">
        <h3>Ánh sáng</h3>
        <div id="lux" class="loader"></div>
    </div>

    <div class="card">
        <h3>Nhiệt độ</h3>
        <div id="temp" class="loader"></div>
    </div>

    <div class="card">
        <h3>Độ ẩm</h3>
        <div id="hum" class="loader"></div>
    </div>
</div>

<script>

// MQTT
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

const topic = "esp32/sensor";

let lastDataTime = 0;
const TIMEOUT = 5000;

client.on("connect", () => {
    client.subscribe(topic);
});

// nhận dữ liệu
client.on("message", (topic, message) => {

    lastDataTime = Date.now();

    try{
        const data = JSON.parse(message.toString());

        if(data.status === "ERROR"){
            showLoading();
            return;
        }

        update("lux", data.lux, " Lux");
        update("temp", data.temp, " °C");
        update("hum", data.hum, " %");

    }catch(e){
        showLoading();
    }
});

// timeout → loading
setInterval(()=>{
    if(Date.now() - lastDataTime > TIMEOUT){
        showLoading();
    }
},1000);

// update value
function update(id, value, unit){
    document.getElementById(id).innerHTML =
        `<div class="value">${Number(value).toFixed(1)}${unit}</div>`;
}

// loading
function showLoading(){
    ["lux","temp","hum"].forEach(id=>{
        document.getElementById(id).innerHTML =
            `<div class="loader"></div>`;
    });
}

</script>

</body>
</html>
