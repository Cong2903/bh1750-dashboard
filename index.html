<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BH1750 MQTT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.dashboard{
    text-align:center;
}
canvas{
    display:block;
    margin:auto;
}
#luxValue{
    font-size:60px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="dashboard">
    <h2>🌞 BH1750 MQTT</h2>
    <canvas id="chart" width="300" height="300"></canvas>
    <div id="luxValue">-- lux</div>
</div>

<script>
// ===== DRAW CHART =====
function drawPie(lux){
    const ctx = document.getElementById("chart").getContext("2d");
    ctx.clearRect(0,0,300,300);

    const cx=150,cy=150,r=100;
    const percent=Math.min(lux/1500,1);
    const angle=percent*Math.PI*2;

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=20;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+angle);
    ctx.strokeStyle='lime';
    ctx.lineWidth=20;
    ctx.lineCap='round';
    ctx.stroke();

    ctx.fillStyle='white';
    ctx.font='bold 24px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(Math.round(lux)+' lux',cx,cy);
}

// ===== MQTT =====
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
    reconnectPeriod: 1000
});

client.on("connect", () => {
    console.log("MQTT connected");
    client.subscribe("bh1750/lux");
});

client.on("message", (topic, message) => {
    console.log("DATA:", message.toString());

    const lux = parseFloat(message.toString());

    document.getElementById("luxValue").innerText = Math.round(lux) + " lux";

    drawPie(lux);
});

client.on("error", (err) => {
    console.log("MQTT error:", err);
});
</script>

</body>
</html>
