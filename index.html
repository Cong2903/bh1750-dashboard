<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BH1750 Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:system-ui;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.dashboard{
    text-align:center;
}
canvas{
    display:block;
    margin:auto;
}
#luxValue{
    font-size:60px;
    font-weight:bold;
    margin-top:20px;
}
#statusText{
    font-size:20px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="dashboard">
    <h2 id="sensorName">🌞 Loading...</h2>

    <canvas id="chart" width="300" height="300"></canvas>

    <div id="luxValue">-- lux</div>

    <div id="statusText">...</div>
</div>

<script>

// ===== DRAW CHART =====
function drawPie(lux, status){
    const ctx = document.getElementById("chart").getContext("2d");
    ctx.clearRect(0,0,300,300);

    const cx=150,cy=150,r=100;
    const percent=Math.min(lux/1500,1);
    const angle=percent*Math.PI*2;

    // nền
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=20;
    ctx.stroke();

    // màu theo trạng thái
    let color = (status === "OK") ? "lime" : "red";

    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+angle);
    ctx.strokeStyle=color;
    ctx.lineWidth=20;
    ctx.lineCap='round';
    ctx.stroke();

    // text giữa
    ctx.fillStyle='white';
    ctx.font='bold 24px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(Math.round(lux)+' lux',cx,cy);
}

// ===== MQTT =====
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
    reconnectPeriod: 1000
});

client.on("connect", () => {
    console.log("MQTT connected");
    client.subscribe("bh1750/lux");
});

client.on("message", (topic, message) => {

    try {
        const data = JSON.parse(message.toString());

        // tên sensor
        document.getElementById("sensorName").innerText = "🌞 " + data.name;

        // giá trị lux (TO bên dưới)
        document.getElementById("luxValue").innerText = Math.round(data.lux) + " lux";

        // trạng thái
        if (data.status === "OK") {
            document.getElementById("statusText").innerText = "✔ OK";
            document.getElementById("statusText").style.color = "lightgreen";
        } else {
            document.getElementById("statusText").innerText = "❌ ERROR";
            document.getElementById("statusText").style.color = "red";
        }

        // vẽ chart
        drawPie(data.lux, data.status);

    } catch (e) {
        console.log("JSON error");
    }
});

client.on("error", (err) => {
    console.log("MQTT error:", err);
});

</script>

</body>
</html>
